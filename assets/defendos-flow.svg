<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1480" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1512"/>
      <stop offset="1" stop-color="#121B17"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3EDDE"/>
      <stop offset="1" stop-color="#E7DFC8"/>
    </linearGradient>
    <style>
      .title { fill:#F3F0E6; font:700 58px Arial, Helvetica, sans-serif; }
      .subtitle { fill:#A5B3AA; font:400 26px Arial, Helvetica, sans-serif; }
      .eyebrow-dark { fill:#C0FF5A; font:700 18px Arial, Helvetica, sans-serif; letter-spacing:2px; text-transform:uppercase; }
      .eyebrow-light { fill:#617E09; font:700 18px Arial, Helvetica, sans-serif; letter-spacing:2px; text-transform:uppercase; }
      .card-title-dark { fill:#F3F0E6; font:700 30px Arial, Helvetica, sans-serif; }
      .card-title-light { fill:#17150E; font:700 30px Arial, Helvetica, sans-serif; }
      .body-dark { fill:#AAB7AE; font:400 18px Arial, Helvetica, sans-serif; }
      .body-light { fill:#4E4A42; font:400 18px Arial, Helvetica, sans-serif; }
      .bullet-dark { fill:#DDE6E1; font:400 18px Arial, Helvetica, sans-serif; }
      .bullet-light { fill:#2F302B; font:400 18px Arial, Helvetica, sans-serif; }
      .pill { fill:#18211E; stroke:#27352F; }
      .pill-text { fill:#C0FF5A; font:700 16px Arial, Helvetica, sans-serif; letter-spacing:1px; text-transform:uppercase; }
      .step-circle { fill:#C0FF5A; }
      .step-text { fill:#0C120F; font:700 20px Arial, Helvetica, sans-serif; }
      .line { stroke:#C0FF5A; stroke-width:5; stroke-linecap:round; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="30" fill="#08100D"/>
  <rect x="20" y="20" width="1560" height="940" rx="26" fill="url(#bg)"/>

  <rect x="1038" y="72" width="164" height="44" rx="22" class="pill"/>
  <rect x="1218" y="72" width="170" height="44" rx="22" class="pill"/>
  <rect x="1404" y="72" width="110" height="44" rx="22" class="pill"/>
  <text x="1074" y="101" class="pill-text">read only</text>
  <text x="1258" y="101" class="pill-text">guided setup</text>
  <text x="1436" y="101" class="pill-text">email</text>

  <text x="88" y="108" class="title">DefendOS</text>
  <text x="88" y="154" class="subtitle">A clear path from machine signal to operator action.</text>

  <g transform="translate(88 228)">
    <rect width="320" height="232" rx="28" fill="#141C18" stroke="#24342D"/>
    <circle cx="42" cy="40" r="20" class="step-circle"/>
    <text x="35" y="47" class="step-text">1</text>
    <text x="78" y="47" class="eyebrow-dark">Inputs</text>
    <text x="34" y="92" class="card-title-dark">Trigger the system</text>
    <text x="34" y="132" class="body-dark">
      <tspan x="34" dy="0">Timers, the dashboard, or an</tspan>
      <tspan x="34" dy="28">approved email can launch</tspan>
      <tspan x="34" dy="28">a new investigation.</tspan>
    </text>
    <text x="34" y="205" class="bullet-dark">
      <tspan x="34" dy="0">• scheduled healthcheck</tspan>
      <tspan x="34" dy="24">• inbox command</tspan>
      <tspan x="34" dy="24">• manual operator run</tspan>
    </text>
  </g>

  <g transform="translate(448 188)">
    <rect width="330" height="312" rx="30" fill="url(#paper)"/>
    <circle cx="42" cy="42" r="20" class="step-circle"/>
    <text x="35" y="49" class="step-text">2</text>
    <text x="78" y="49" class="eyebrow-light">Healthcheck</text>
    <text x="34" y="104" class="card-title-light">Inspect the whole VPS</text>
    <text x="34" y="148" class="body-light">
      <tspan x="34" dy="0">DefendOS reads machine-wide</tspan>
      <tspan x="34" dy="28">signals before asking Codex.</tspan>
    </text>
    <text x="34" y="214" class="bullet-light">
      <tspan x="34" dy="0">• SSH auth and root access</tspan>
      <tspan x="34" dy="24">• public ports and sessions</tspan>
      <tspan x="34" dy="24">• cron, systemd, firewall</tspan>
      <tspan x="34" dy="24">• brute-force indicators</tspan>
    </text>
  </g>

  <g transform="translate(818 188)">
    <rect width="330" height="312" rx="30" fill="#141C18" stroke="#24342D"/>
    <circle cx="42" cy="42" r="20" class="step-circle"/>
    <text x="35" y="49" class="step-text">3</text>
    <text x="78" y="49" class="eyebrow-dark">Codex</text>
    <text x="34" y="104" class="card-title-dark">Read-only investigation</text>
    <text x="34" y="148" class="body-dark">
      <tspan x="34" dy="0">If Codex is enabled, it gets</tspan>
      <tspan x="34" dy="28">the healthcheck context and</tspan>
      <tspan x="34" dy="28">triages the host in read-only mode.</tspan>
    </text>
    <text x="34" y="238" class="bullet-dark">
      <tspan x="34" dy="0">• no config edits</tspan>
      <tspan x="34" dy="24">• no package install</tspan>
      <tspan x="34" dy="24">• concise French summary</tspan>
    </text>
  </g>

  <g transform="translate(1188 228)">
    <rect width="324" height="232" rx="28" fill="#141C18" stroke="#24342D"/>
    <circle cx="42" cy="40" r="20" class="step-circle"/>
    <text x="35" y="47" class="step-text">4</text>
    <text x="78" y="47" class="eyebrow-dark">Outputs</text>
    <text x="34" y="92" class="card-title-dark">Show, alert, or reply</text>
    <text x="34" y="132" class="body-dark">
      <tspan x="34" dy="0">The final result is written to</tspan>
      <tspan x="34" dy="28">the dashboard and can also</tspan>
      <tspan x="34" dy="28">trigger email actions.</tspan>
    </text>
    <text x="34" y="205" class="bullet-dark">
      <tspan x="34" dy="0">• local dashboard update</tspan>
      <tspan x="34" dy="24">• urgent alert email</tspan>
      <tspan x="34" dy="24">• threaded inbox reply</tspan>
    </text>
  </g>

  <path d="M408 344H436" class="line"/>
  <path d="M408 344L392 330" class="line"/>
  <path d="M408 344L392 358" class="line"/>

  <path d="M778 344H806" class="line"/>
  <path d="M778 344L762 330" class="line"/>
  <path d="M778 344L762 358" class="line"/>

  <path d="M1148 344H1176" class="line"/>
  <path d="M1148 344L1132 330" class="line"/>
  <path d="M1148 344L1132 358" class="line"/>

  <g transform="translate(88 560)">
    <rect width="690" height="300" rx="30" fill="#141C18" stroke="#24342D"/>
    <text x="36" y="54" class="eyebrow-dark">What it watches</text>
    <text x="36" y="110" class="card-title-dark">Security posture of the whole machine</text>
    <text x="36" y="160" class="bullet-dark">
      <tspan x="36" dy="0">• root logins and password authentication</tspan>
      <tspan x="36" dy="30">• unexpected public ports or odd processes</tspan>
      <tspan x="36" dy="30">• auth log anomalies and brute-force traces</tspan>
      <tspan x="36" dy="30">• suspicious cron and systemd persistence</tspan>
      <tspan x="36" dy="30">• inbox commands from approved senders only</tspan>
    </text>
  </g>

  <g transform="translate(822 560)">
    <rect width="690" height="300" rx="30" fill="url(#paper)"/>
    <text x="36" y="54" class="eyebrow-light">What it avoids</text>
    <text x="36" y="110" class="card-title-light">No blind auto-remediation</text>
    <text x="36" y="160" class="bullet-light">
      <tspan x="36" dy="0">• no package install during investigations</tspan>
      <tspan x="36" dy="30">• no config rewrite during read-only triage</tspan>
      <tspan x="36" dy="30">• no secret stored in git or in README visuals</tspan>
      <tspan x="36" dy="30">• no hidden action without an observable result</tspan>
      <tspan x="36" dy="30">• you keep the final decision loop</tspan>
    </text>
  </g>
</svg>
