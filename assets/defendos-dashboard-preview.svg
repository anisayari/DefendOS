<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="50" x2="1510" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1210"/>
      <stop offset="1" stop-color="#121917"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3EEDF"/>
      <stop offset="1" stop-color="#E7DEC7"/>
    </linearGradient>
    <style>
      .brand { fill:#F2EFE6; font:700 40px Arial, Helvetica, sans-serif; }
      .rail-copy { fill:#99A7A0; font:400 19px Arial, Helvetica, sans-serif; }
      .mono { fill:#C0FF5A; font:700 16px Arial, Helvetica, sans-serif; letter-spacing:1.6px; text-transform:uppercase; }
      .nav { fill:#F2EFE6; font:600 22px Arial, Helvetica, sans-serif; }
      .hero-title { fill:#17140E; font:700 48px Arial, Helvetica, sans-serif; }
      .hero-copy { fill:#565147; font:400 22px Arial, Helvetica, sans-serif; }
      .card-title { fill:#F2EFE6; font:700 28px Arial, Helvetica, sans-serif; }
      .card-copy { fill:#9DACA4; font:400 18px Arial, Helvetica, sans-serif; }
      .light-title { fill:#17140E; font:700 28px Arial, Helvetica, sans-serif; }
      .light-copy { fill:#4E4940; font:400 18px Arial, Helvetica, sans-serif; }
      .chip-dark { fill:#18211E; stroke:#27342F; }
      .chip-light { fill:#ECE5D2; }
      .chip-text-dark { fill:#C0FF5A; font:700 15px Arial, Helvetica, sans-serif; letter-spacing:1px; text-transform:uppercase; }
      .chip-text-light { fill:#688000; font:700 15px Arial, Helvetica, sans-serif; letter-spacing:1px; text-transform:uppercase; }
      .label { fill:#C0FF5A; font:700 16px Arial, Helvetica, sans-serif; letter-spacing:1.4px; text-transform:uppercase; }
      .row-title { fill:#F2EFE6; font:600 20px Arial, Helvetica, sans-serif; }
      .row-sub { fill:#8D9E96; font:400 16px Arial, Helvetica, sans-serif; }
      .signal { fill:#FFBDB3; font:700 17px Arial, Helvetica, sans-serif; letter-spacing:1px; text-transform:uppercase; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="30" fill="#09100D"/>
  <rect x="20" y="20" width="1560" height="940" rx="26" fill="url(#bg)"/>

  <rect x="54" y="54" width="274" height="872" rx="26" fill="#141C18" stroke="#24342D"/>
  <circle cx="106" cy="108" r="24" fill="#C0FF5A"/>
  <text x="86" y="117" fill="#09100D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">DO</text>
  <text x="146" y="111" class="brand">DefendOS</text>
  <text x="146" y="145" class="rail-copy">Global surveillance</text>
  <text x="88" y="192" class="rail-copy">
    <tspan x="88" dy="0">A local console for healthchecks,</tspan>
    <tspan x="88" dy="24">guided setup, inbox automation,</tspan>
    <tspan x="88" dy="24">and read-only Codex triage.</tspan>
  </text>

  <rect x="84" y="262" width="214" height="66" rx="18" fill="#1A2521"/>
  <rect x="84" y="344" width="214" height="66" rx="18" fill="#1A2521"/>
  <rect x="84" y="426" width="214" height="66" rx="18" fill="#1A2521"/>
  <rect x="84" y="508" width="214" height="66" rx="18" fill="#1A2521"/>
  <rect x="84" y="590" width="214" height="66" rx="18" fill="#1A2521"/>
  <text x="114" y="304" class="nav">Overview</text>
  <text x="114" y="386" class="nav">Setup</text>
  <text x="114" y="468" class="nav">Operations</text>
  <text x="114" y="550" class="nav">Runs</text>
  <text x="114" y="632" class="nav">Activity</text>

  <rect x="366" y="54" width="1180" height="210" rx="26" fill="url(#paper)"/>
  <text x="410" y="108" class="mono">Live posture</text>
  <text x="410" y="164" class="hero-title">
    <tspan x="410" dy="0">Machine posture and</tspan>
    <tspan x="410" dy="50">incident triage</tspan>
  </text>
  <text x="410" y="248" class="hero-copy">One place to follow machine-wide signal, operator actions, and inbox-triggered runs.</text>

  <rect x="1174" y="92" width="164" height="42" rx="21" class="chip-light"/>
  <rect x="1352" y="92" width="140" height="42" rx="21" class="chip-light"/>
  <text x="1208" y="120" class="chip-text-light">setup ready</text>
  <text x="1386" y="120" class="chip-text-light">local only</text>

  <rect x="366" y="294" width="736" height="284" rx="24" fill="#141C18" stroke="#24342D"/>
  <text x="404" y="344" class="label">Overview panel</text>
  <text x="404" y="392" class="card-title">Whole-system health at a glance</text>
  <rect x="404" y="426" width="336" height="44" rx="22" fill="#26312C"/>
  <text x="436" y="455" class="signal">critical - root SSH still enabled</text>
  <text x="404" y="510" class="card-copy">
    <tspan x="404" dy="0">Latest run, findings to watch, recommended</tspan>
    <tspan x="404" dy="24">actions, and a quick machine posture summary.</tspan>
  </text>
  <rect x="404" y="540" width="290" height="16" rx="8" fill="#1D2723"/>
  <rect x="404" y="570" width="242" height="16" rx="8" fill="#1D2723"/>

  <rect x="1128" y="294" width="418" height="284" rx="24" fill="#141C18" stroke="#24342D"/>
  <text x="1166" y="344" class="label">Readiness</text>
  <rect x="1166" y="378" width="160" height="86" rx="18" fill="#1A2521"/>
  <rect x="1342" y="378" width="160" height="86" rx="18" fill="#1A2521"/>
  <rect x="1166" y="478" width="160" height="86" rx="18" fill="#1A2521"/>
  <rect x="1342" y="478" width="160" height="86" rx="18" fill="#1A2521"/>
  <text x="1204" y="415" class="row-title">Codex</text>
  <text x="1198" y="441" class="row-sub">read-only investigation</text>
  <text x="1366" y="415" class="row-title">Outbound</text>
  <text x="1364" y="441" class="row-sub">alert transport</text>
  <text x="1208" y="515" class="row-title">Inbox</text>
  <text x="1200" y="541" class="row-sub">approved senders only</text>
  <text x="1374" y="515" class="row-title">Alerts</text>
  <text x="1362" y="541" class="row-sub">severity routing</text>

  <rect x="366" y="608" width="562" height="318" rx="24" fill="#141C18" stroke="#24342D"/>
  <text x="404" y="658" class="label">Setup wizard</text>
  <text x="404" y="706" class="card-title">Guided configuration from the dashboard</text>
  <text x="404" y="752" class="card-copy">
    <tspan x="404" dy="0">Fill mailbox, providers, allowlists, and</tspan>
    <tspan x="404" dy="24">Codex settings without editing files by hand.</tspan>
  </text>
  <rect x="404" y="790" width="218" height="50" rx="16" fill="#1A2521"/>
  <rect x="646" y="790" width="218" height="50" rx="16" fill="#1A2521"/>
  <rect x="404" y="856" width="460" height="50" rx="16" fill="#1A2521"/>
  <text x="434" y="821" class="row-title">Alert email</text>
  <text x="676" y="821" class="row-title">Inbox provider</text>
  <text x="434" y="887" class="row-title">Save setup while keeping existing secrets</text>

  <rect x="958" y="608" width="588" height="318" rx="24" fill="url(#paper)"/>
  <text x="996" y="658" class="mono">Run timeline</text>
  <text x="996" y="706" class="light-title">Recent runs and selected incident detail</text>
  <text x="996" y="752" class="light-copy">
    <tspan x="996" dy="0">Clickable runs, compact severity labels, and</tspan>
    <tspan x="996" dy="24">a readable trail of machine investigations.</tspan>
  </text>
  <rect x="996" y="794" width="510" height="54" rx="18" fill="#ECE5D2"/>
  <rect x="996" y="862" width="510" height="54" rx="18" fill="#ECE5D2"/>
  <text x="1028" y="828" fill="#17140E" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600">scheduled healthcheck · critical</text>
  <text x="1028" y="896" fill="#17140E" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600">manual investigation · info</text>
</svg>
